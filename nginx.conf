worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Enable brotli if available (requires ngx_brotli module)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # ==================================
    # 1000 request / hour ≈ 16 request / minute
    # ==================================
    limit_req_zone $binary_remote_addr zone=per_ip:10m rate=16r/m;

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # Security Headers - إعدادات الأمان وحماية الموقع
        
        # Content Security Policy (CSP): Protects against XSS and other attacks
        # سياسة أمان المحتوى: تمنع حقن الأكواد الضارة وتحمي بيانات المستخدمين
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://accounts.google.com https://cdn.jsdelivr.net https://js.stripe.com blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://accounts.google.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://accounts.google.com https://*.cloudinary.com https://*.paymob.com https://api.stripe.com https://formspree.io ws: wss:; frame-src 'self' https://accounts.google.com https://*.paymob.com https://js.stripe.com https://hooks.stripe.com https://checkout.stripe.com; worker-src 'self' blob:; media-src 'self' data:;" always;
        
        # Prevent clickjacking: Ensures the site cannot be embedded in frames on other sites
        # حماية من الاختطاف: تمنع عرض الموقع داخل إطارات (Frames) في مواقع أخرى
        add_header X-Frame-Options "SAMEORIGIN" always;
        
        # HSTS (Strict Transport Security): Forces the browser to use HTTPS only
        # إجبار التشفير: يجبر المتصفح على استخدام النسخة المشفرة (HTTPS) فقط لمدة سنة
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        
        # Cross-Origin Policies: Security rules for interacting with other domains
        # سياسات الروابط الخارجية: قواعد الأمان عند التفاعل مع خدمات من مواقع أخرى
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "unsafe-none" always;
        
        # Additional security headers - طبقات حماية إضافية
        add_header X-Content-Type-Options "nosniff" always; # Prevent MIME sniffing - منع تخمين أنواع الملفات
        add_header X-XSS-Protection "1; mode=block" always; # Basic XSS filter - فلتر حماية أساسي
        add_header Referrer-Policy "strict-origin-when-cross-origin" always; # Control how much info is sent when clicking links
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always; # Disable sensitive features - منع الوصول للكاميرا والموقع
        
        # SEO: Tell search engines to index the site - إخبار جوجل بفهرسة الموقع
        add_header X-Robots-Tag "index, follow" always;

        # Cache static assets: Improves loading speed for returning users
        # تخزين الملفات مؤقتاً: كاش لتحسين سرعة تحميل الصور والملفات الثابتة
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Serve pre-compressed files if available
        location ~ \.(js|css|svg|json)$ {
            gzip_static on;
            # brotli_static on;
        }

        location / {
            limit_req zone=per_ip burst=10 nodelay;
            limit_req_status 429;
            try_files $uri /index.html;
        }
    }
}
